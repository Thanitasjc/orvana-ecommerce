        value: 677f4f9668545278fbda8b1d0b90907d9a744338330aa4340d33bfe2fa71a86c
      - key: AWS_DEFAULT_REGION
        value: ap-northeast-1
      - key: AWS_BUCKET
        value: media
      - key: AWS_ENDPOINT
        value: https://cormktzdjxsaqafxsdkr.storage.supabase.co/storage/v1/s3
      - key: AWS_URL
        value: https://cormktzdjxsaqafxsdkr.supabase.co/storage/v1/object/public/media
